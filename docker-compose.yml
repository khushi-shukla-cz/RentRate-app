version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: rentrate_mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rentrate_api
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGODB_URI=mongodb://mongodb:27017/rentrate
      - JWT_SECRET=rentrate_docker_secret_2024
      - JWT_EXPIRES_IN=7d
      - NODE_ENV=production
    depends_on:
      - mongodb
    restart: unless-stopped

volumes:
  mongo_data:
